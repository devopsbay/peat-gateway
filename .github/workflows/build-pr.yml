name: Build PR Image

on:
  pull_request:
    types: [labeled, synchronize]

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  build:
    if: >-
      (github.event.action == 'labeled' && (github.event.label.name == 'single-build' || github.event.label.name == 'build-on-push')) ||
      (github.event.action == 'synchronize' && contains(github.event.pull_request.labels.*.name, 'build-on-push'))
    name: Build & Push
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Set image tag
        id: meta
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "tag=pr-${{ github.event.pull_request.number }}-${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/Github-ECR-Builder
          role-session-name: PeatGatewayPRBuild
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to ECR
        run: |
          ECR="${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com"
          aws ecr get-login-password --region "${{ secrets.AWS_REGION }}" | \
            docker login --username AWS --password-stdin "$ECR"
          echo "ECR_REGISTRY=$ECR" >> "$GITHUB_ENV"

      - name: Build and push
        run: |
          IMAGE="${ECR_REGISTRY}/trop/peat-gateway:${{ steps.meta.outputs.tag }}"
          docker build --platform linux/amd64 --target chainguard -t "$IMAGE" .
          docker push "$IMAGE"
          echo "Pushed: $IMAGE"

      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const image = '${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/trop/peat-gateway:${{ steps.meta.outputs.tag }}';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: `### Image pushed to ECR\n\`\`\`\n${image}\n\`\`\`\nKargo will auto-detect pr-* tags within ~5 min.`
            });

      - name: Remove single-build label
        if: >-
          always() &&
          github.event.action == 'labeled' && github.event.label.name == 'single-build'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.removeLabel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              name: 'single-build'
            }).catch(() => {});
